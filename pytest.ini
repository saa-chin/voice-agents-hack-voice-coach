[pytest]
testpaths = tests
asyncio_mode = auto
addopts =
    -ra
    --strict-markers
    --tb=short
    --cov=cli
    --cov=web-py/backend/app
    --cov-report=term-missing:skip-covered
    --cov-fail-under=85
filterwarnings =
    ignore::DeprecationWarning:websockets.*
    ignore::DeprecationWarning:asyncio.*
markers =
    asyncio: mark a test as asyncio
